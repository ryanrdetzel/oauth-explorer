server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets
    gzip on;
    gzip_types text/plain text/css text/html application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # HTML must always revalidate (single-file site, content can change on every deploy).
    # ETag stays on by default, so unchanged requests get a cheap 304.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Root falls back to index.html
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
